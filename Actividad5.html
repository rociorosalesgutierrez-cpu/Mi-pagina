  border-radius:12px;
  border:1px solid #ddd;
}

.form-control:focus, .form-select:focus{
  border-color:#000;
  box-shadow:none;
}

/* botón */

  background:#000;
  border:none;
  border-radius:12px;

<div class="container py-5">
  <div class="form-container">

    <h3 class="mb-4">Registro Completo</h3>

    <form>

      <!-- FILA 1 -->
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" placeholder="Tu nombre">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Apellido</label>
          <input type="text" class="form-control" placeholder="Tu apellido">
        </div>
      </div>

      <!-- FILA 2 -->
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" placeholder="correo@gmail.com">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Teléfono</label>
          <input type="text" class="form-control" placeholder="70000000">
        </div>
      </div>

      <!-- FILA 3 -->
      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">País</label>
          <select class="form-select">
            <option>Bolivia</option>
            <option>Perú</option>
            <option>Argentina</option>
          </select>
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Ciudad</label>
          <input type="text" class="form-control" placeholder="Tu ciudad">
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Código Postal</label>
          <input type="text" class="form-control" placeholder="0000">
        </div>
      </div>

      <!-- FILA 4 -->
      <div class="mb-3">
        <label class="form-label">Dirección</label>
        <input type="text" class="form-control" placeholder="Calle, número, zona">
      </div>

      <!-- FILA 5 -->
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" placeholder="********">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Confirmar contraseña</label>
          <input type="password" class="form-control" placeholder="********">
        </div>
      </div>

      <!-- FILA 6 -->
      <div class="mb-3">
        <label class="form-label">Comentarios</label>
        <textarea class="form-control" rows="3" placeholder="Escribe algo..."></textarea>
      </div>

      <!-- CHECK -->
      <div class="form-check mb-4">
        <input class="form-check-input" type="checkbox">
        <label class="form-check-label">
          Acepto los términos y condiciones
        </label>
      </div>

      <!-- BOTÓN -->
      <button type="submit" class="btn btn-primary w-100">
        Crear cuenta
      </button>

    </form>

  </div>
</div>
